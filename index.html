<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zerax Store</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background: #000000;
            color: #ffffff;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 60px;
            padding: 40px 20px;
            border-bottom: 1px solid #222;
        }

        h1 {
            font-size: 3.5em;
            margin-bottom: 15px;
            font-weight: 300;
            letter-spacing: 8px;
            text-transform: uppercase;
        }

        .subtitle {
            font-size: 1em;
            opacity: 0.6;
            font-weight: 300;
            letter-spacing: 3px;
            text-transform: uppercase;
        }

        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 40px;
            margin-bottom: 60px;
        }

        .product-card {
            background: #0a0a0a;
            border: 1px solid #1a1a1a;
            overflow: hidden;
            transition: all 0.4s ease;
        }

        .product-card:hover {
            border-color: #ffffff;
            transform: translateY(-5px);
        }

        .product-image {
            width: 100%;
            height: 400px;
            background: #1a1a1a;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 5em;
            position: relative;
            overflow: hidden;
            border-bottom: 1px solid #222;
        }

        .product-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .product-card:hover .product-image {
            background: #222;
        }

        .product-info {
            padding: 30px;
        }

        .product-name {
            font-size: 1.4em;
            font-weight: 400;
            margin-bottom: 12px;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .product-description {
            color: #999;
            margin-bottom: 20px;
            line-height: 1.6;
            font-size: 0.95em;
            font-weight: 300;
        }

        .product-price {
            font-size: 1.6em;
            font-weight: 300;
            margin-bottom: 25px;
            letter-spacing: 1px;
        }

        .instagram-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            width: 100%;
            padding: 16px;
            background: #ffffff;
            color: #000000;
            border: 2px solid #ffffff;
            font-size: 0.95em;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .instagram-btn:hover {
            background: #000000;
            color: #ffffff;
        }

        .instagram-icon {
            width: 20px;
            height: 20px;
            transition: transform 0.3s ease;
        }

        .instagram-btn:hover .instagram-icon {
            transform: scale(1.1);
        }

        footer {
            text-align: center;
            padding: 40px 20px;
            margin-top: 60px;
            border-top: 1px solid #222;
        }

        footer p {
            color: #666;
            font-size: 0.9em;
            letter-spacing: 1px;
            font-weight: 300;
        }

        footer p:first-child {
            margin-bottom: 15px;
            color: #999;
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 2.2em;
                letter-spacing: 4px;
            }

            .products-grid {
                grid-template-columns: 1fr;
                gap: 30px;
            }

            .product-image {
                height: 350px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Zerax Store</h1>
            <p class="subtitle">Coleção Exclusiva 2024</p>
        </header>

        <div class="products-grid" id="products-container"></div>

        <footer>
            <p>Siga-nos no Instagram para mais novidades</p>
            <p>© 2024 Zerax Store - Todos os direitos reservados</p>
        </footer>
    </div>

    <script>
        // ====================================
        // 🛍️ ADICIONE SEUS PRODUTOS AQUI
        // ====================================
        
        // 🔗 LINK ÚNICO DO INSTAGRAM (todos os produtos vão para este link)
        const linkInstagram = "https://www.instagram.com/zerax_brasil/";
        
        const produtos = [
            {
                imagem: "https://images.unsplash.com/photo-1521572163474-6864f9cf17ab?w=500",
                nome: "Camiseta Premium",
                descricao: "Camiseta 100% algodão com design exclusivo e corte moderno. Tecido de alta qualidade.",
                preco: "89,90"
            },
            {
                imagem: "https://images.unsplash.com/photo-1542272604-787c3835535d?w=500",
                nome: "Calça Jeans",
                descricao: "Jeans de alta qualidade com modelagem slim fit. Conforto e estilo em um único produto.",
                preco: "159,90"
            },
            {
                imagem: "👗",
                nome: "Vestido Elegante",
                descricao: "Vestido midi perfeito para ocasiões especiais. Design atemporal e sofisticado.",
                preco: "199,90"
            },
            {
                imagem: "🧥",
                nome: "Jaqueta Jeans",
                descricao: "Jaqueta jeans clássica com detalhes modernos. Peça coringa para qualquer look.",
                preco: "179,90"
            },
            {
                imagem: "👟",
                nome: "Tênis Casual",
                descricao: "Tênis confortável para o dia a dia. Estilo e conforto em cada passo.",
                preco: "149,90"
            },
            {
                imagem: "🧢",
                nome: "Boné Estiloso",
                descricao: "Boné urbano com ajuste perfeito. Design único para complementar seu estilo.",
                preco: "69,90"
            }
        ];

        // ====================================
        // 🚀 CÓDIGO AUTOMÁTICO (não mexer)
        // ====================================
        
        const container = document.getElementById('products-container');
        
        produtos.forEach(produto => {
            // Verifica se é URL ou emoji
            const isURL = produto.imagem.startsWith('http');
            const imagemHTML = isURL 
                ? `<img src="${produto.imagem}" alt="${produto.nome}">`
                : produto.imagem;
            
            const card = `
                <div class="product-card">
                    <div class="product-image">${imagemHTML}</div>
                    <div class="product-info">
                        <h2 class="product-name">${produto.nome}</h2>
                        <p class="product-description">${produto.descricao}</p>
                        <p class="product-price">R$ ${produto.preco}</p>
                        <a href="${linkInstagram}" target="_blank" class="instagram-btn">
                            <svg class="instagram-icon" viewBox="0 0 24 24" fill="currentColor">
                                <path d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zm0-2.163c-3.259 0-3.667.014-4.947.072-4.358.2-6.78 2.618-6.98 6.98-.059 1.281-.073 1.689-.073 4.948 0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98 1.281.058 1.689.072 4.948.072 3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98-1.281-.059-1.69-.073-4.949-.073zm0 5.838c-3.403 0-6.162 2.759-6.162 6.162s2.759 6.163 6.162 6.163 6.162-2.759 6.162-6.163c0-3.403-2.759-6.162-6.162-6.162zm0 10.162c-2.209 0-4-1.79-4-4 0-2.209 1.791-4 4-4s4 1.791 4 4c0 2.21-1.791 4-4 4zm6.406-11.845c-.796 0-1.441.645-1.441 1.44s.645 1.44 1.441 1.44c.795 0 1.439-.645 1.439-1.44s-.644-1.44-1.439-1.44z"/>
                            </svg>
                            Ver no Instagram
                        </a>
                    </div>
                </div>
            `;
            container.innerHTML += card;
        });
    </script>
</body>
</html>
